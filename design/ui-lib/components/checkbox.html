<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkbox — 组件预览</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../tokens.css">
  <style>
    .checkbox-label { display: inline-flex; align-items: center; gap: var(--spacing-2); cursor: pointer; font-size: var(--text-sm); color: var(--text-primary); user-select: none; }
    .checkbox-label:has(.checkbox-input:disabled) { opacity: 0.4; cursor: not-allowed; }
    .checkbox-input { position: absolute; opacity: 0; width: 0; height: 0; }
    .checkbox-control { width: 20px; height: 20px; border: 1.5px solid var(--border-default); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; transition: all var(--transition-fast); background: transparent; flex-shrink: 0; }
    .checkbox-input:hover:not(:disabled) + .checkbox-control { border-color: var(--border-strong); }
    .checkbox-input:focus-visible + .checkbox-control { outline: 2px solid var(--color-brand-mid); outline-offset: 2px; }
    .checkbox-input:checked + .checkbox-control { background: var(--color-brand-gradient); border-color: transparent; }
    .checkbox-check { width: 12px; height: 12px; color: white; opacity: 0; transform: scale(0); transition: all 150ms cubic-bezier(0.34, 1.56, 0.64, 1); }
    .checkbox-input:checked + .checkbox-control .checkbox-check { opacity: 1; transform: scale(1); }
    .checkbox-input:indeterminate + .checkbox-control { background: var(--color-brand-gradient); border-color: transparent; }
    .checkbox-input:indeterminate + .checkbox-control .checkbox-check { opacity: 0; }
    .checkbox-input:indeterminate + .checkbox-control::after { content: ''; width: 10px; height: 2px; background: white; border-radius: 1px; }
    .checkbox--sm .checkbox-control { width: 16px; height: 16px; }
    .checkbox--sm .checkbox-check { width: 10px; height: 10px; }
    .checkbox--lg .checkbox-control { width: 24px; height: 24px; }
    .checkbox--lg .checkbox-check { width: 14px; height: 14px; }
    .checkbox-text { line-height: 1; }
    .checkbox-hint { font-size: var(--text-xs); color: var(--text-tertiary); margin-top: var(--spacing-1); margin-left: 28px; }

    body { font-family: var(--font-sans); background: var(--bg-base); color: var(--text-primary); margin: 0; padding: var(--spacing-8); }
    .demo-section { margin-bottom: var(--spacing-12); }
    .demo-title { font-size: var(--text-lg); font-weight: var(--font-semibold); margin-bottom: var(--spacing-4); border-bottom: 1px solid var(--border-subtle); padding-bottom: var(--spacing-2); }
    .demo-row { display: flex; flex-direction: column; gap: var(--spacing-3); margin-bottom: var(--spacing-4); }
    .demo-row-h { display: flex; gap: var(--spacing-6); align-items: center; flex-wrap: wrap; margin-bottom: var(--spacing-4); }
    .demo-label { font-size: var(--text-xs); color: var(--text-tertiary); min-width: 80px; font-weight: var(--font-medium); }
    .theme-switch { position: fixed; top: var(--spacing-4); right: var(--spacing-4); z-index: 100; display: flex; gap: var(--spacing-2); }
    .theme-btn { padding: var(--spacing-2) var(--spacing-3); border-radius: var(--radius-md); border: 1px solid var(--border-default); background: var(--bg-surface); color: var(--text-secondary); cursor: pointer; font-size: var(--text-sm); font-family: var(--font-sans); }
    .theme-btn.active { border-color: var(--color-brand-mid); color: var(--color-brand-mid); }
    h1 { font-size: var(--text-3xl); font-weight: var(--font-bold); margin-bottom: var(--spacing-2); }
    .subtitle { color: var(--text-secondary); font-size: var(--text-base); margin-bottom: var(--spacing-8); }
    .demo-card { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: var(--spacing-5); }
  </style>
</head>
<body>
  <div class="theme-switch"><button class="theme-btn active" onclick="setTheme('light')">Light</button><button class="theme-btn" onclick="setTheme('dark')">Dark</button></div>
  <h1>Checkbox 复选框</h1>
  <p class="subtitle">多选场景组件，选中状态使用品牌渐变色 + 弹性动画。</p>

  <div class="demo-section">
    <div class="demo-title">基础复选框</div>
    <div class="demo-card">
      <div class="demo-row">
        <label class="checkbox-label">
          <input type="checkbox" class="checkbox-input">
          <span class="checkbox-control"><svg class="checkbox-check" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M2.5 6l2.5 2.5 4.5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <span class="checkbox-text">公开作品到广场</span>
        </label>
        <span class="checkbox-hint">公开后其他用户可以在作品广场看到你的创作</span>
      </div>
      <div class="demo-row">
        <label class="checkbox-label">
          <input type="checkbox" class="checkbox-input" checked>
          <span class="checkbox-control"><svg class="checkbox-check" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M2.5 6l2.5 2.5 4.5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <span class="checkbox-text">自动保存生成记录</span>
        </label>
      </div>
      <div class="demo-row">
        <label class="checkbox-label">
          <input type="checkbox" class="checkbox-input" id="cb-indeterminate">
          <span class="checkbox-control"><svg class="checkbox-check" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M2.5 6l2.5 2.5 4.5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <span class="checkbox-text">全选（Indeterminate）</span>
        </label>
      </div>
      <div class="demo-row">
        <label class="checkbox-label">
          <input type="checkbox" class="checkbox-input" disabled>
          <span class="checkbox-control"><svg class="checkbox-check" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M2.5 6l2.5 2.5 4.5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <span class="checkbox-text">不可选（Disabled）</span>
        </label>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <div class="demo-title">尺寸</div>
    <div class="demo-row-h">
      <label class="checkbox-label checkbox--sm"><input type="checkbox" class="checkbox-input" checked><span class="checkbox-control"><svg class="checkbox-check" viewBox="0 0 12 12" fill="none"><path d="M2.5 6l2.5 2.5 4.5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="checkbox-text">SM 16px</span></label>
      <label class="checkbox-label"><input type="checkbox" class="checkbox-input" checked><span class="checkbox-control"><svg class="checkbox-check" viewBox="0 0 12 12" fill="none"><path d="M2.5 6l2.5 2.5 4.5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="checkbox-text">MD 20px</span></label>
      <label class="checkbox-label checkbox--lg"><input type="checkbox" class="checkbox-input" checked><span class="checkbox-control"><svg class="checkbox-check" viewBox="0 0 12 12" fill="none"><path d="M2.5 6l2.5 2.5 4.5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="checkbox-text">LG 24px</span></label>
    </div>
  </div>

  <script>
    function setTheme(t){document.documentElement.setAttribute('data-theme',t);document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase()===t));}
    document.getElementById('cb-indeterminate').indeterminate = true;
  </script>
</body>
</html>
