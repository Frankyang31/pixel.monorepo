<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabs — 深夜工作室</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../tokens.css">
  <style>
    /* ================================================================
       TABS — "安静的导航灯"
       指示器不是简单实线，而是品牌渐变色。
       活跃 Tab 的文字也带渐变——视觉焦点自然流动。
       ================================================================ */

    /* --- Base --- */
    .tabs {
      display: inline-flex;
      position: relative;
    }
    .tabs__item {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-2);
      font-family: var(--font-sans);
      font-weight: var(--font-medium);
      color: var(--text-secondary);
      background: transparent;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      position: relative;
      padding: 0 var(--spacing-4);
      height: 40px;
      font-size: var(--text-sm);
      transition: color var(--transition-normal);
      z-index: 1;
    }
    .tabs__item:focus-visible { outline: 2px solid var(--color-brand-mid); outline-offset: 2px; border-radius: var(--radius-sm); }
    .tabs__item:focus:not(:focus-visible) { outline: none; }
    .tabs__item:disabled { opacity: 0.3; cursor: not-allowed; }
    .tabs__item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .tabs__item:hover:not(:disabled) { color: var(--text-primary); }

    /* ------------------------------------------------------------------
       UNDERLINE — 渐变指示器
       指示器是 2px 渐变色条，活跃 Tab 文字带渐变色
       ------------------------------------------------------------------ */
    .tabs--underline .tabs__item::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: var(--spacing-4);
      right: var(--spacing-4);
      height: 2px;
      background: var(--color-brand-gradient-h);
      border-radius: 1px;
      transform: scaleX(0);
      transform-origin: center;
      transition: transform var(--transition-slow);
    }
    .tabs--underline .tabs__item.is-active::after { transform: scaleX(1); }
    .tabs--underline .tabs__item.is-active {
      color: transparent;
      background: var(--text-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      font-weight: var(--font-semibold);
    }
    /* fallback 文字色 */
    .tabs--underline .tabs__item.is-active { color: var(--text-gradient-color); }

    /* ------------------------------------------------------------------
       PILL — 玻璃态容器
       容器用极淡玻璃态，活跃项渐变填充 + 发光
       ------------------------------------------------------------------ */
    .tabs--pill {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-full);
      padding: 3px;
      gap: var(--spacing-1);
    }
    .tabs--pill .tabs__item {
      padding: 0 var(--spacing-4);
      border-radius: var(--radius-full);
      height: 32px;
      font-size: var(--text-xs);
    }
    .tabs--pill .tabs__item:hover:not(.is-active) {
      background: var(--glass-bg);
      color: var(--text-primary);
    }
    .tabs--pill .tabs__item.is-active {
      background: var(--color-brand-gradient);
      color: #FFFFFF;
      font-weight: var(--font-semibold);
      box-shadow: var(--glow-brand-sm);
    }

    /* ------------------------------------------------------------------
       SEGMENT — 玻璃态分段
       活跃项带品牌色渐变边框
       ------------------------------------------------------------------ */
    .tabs--segment {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 3px;
    }
    .tabs--segment .tabs__item {
      flex: 1;
      justify-content: center;
      padding: 0 var(--spacing-4);
      height: 36px;
      font-size: var(--text-sm);
      border-radius: 6px;
      position: relative;
    }
    .tabs--segment .tabs__item.is-active {
      font-weight: var(--font-semibold);
      color: var(--text-primary);
      background: var(--glass-bg-strong);
      /* 渐变边框 */
      border: 1px solid transparent;
      background-clip: padding-box;
      box-shadow: var(--glow-brand-sm);
    }
    .tabs--segment .tabs__item.is-active::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: var(--color-brand-gradient);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* --- Sizes --- */
    .tabs--sm .tabs__item { height: 32px; font-size: var(--text-xs); padding: 0 var(--spacing-3); }
    .tabs--lg .tabs__item { height: 48px; font-size: var(--text-base); padding: 0 var(--spacing-6); }

    /* ================================================================
       DEMO LAYOUT
       ================================================================ */
    body {
      font-family: var(--font-sans);
      background: var(--bg-base);
      color: var(--text-primary);
      margin: 0;
      padding: var(--spacing-8) var(--spacing-8) var(--spacing-20);
      max-width: 960px;
      margin-left: auto;
      margin-right: auto;
      transition: background-color var(--transition-slow), color var(--transition-slow);
    }
    .demo-header { margin-bottom: var(--spacing-10); padding-bottom: var(--spacing-6); border-bottom: 1px solid var(--border-subtle); }
    h1 { font-size: var(--text-2xl); font-weight: var(--font-bold); margin: 0 0 var(--spacing-1) 0; letter-spacing: -0.02em; }
    .subtitle { color: var(--text-secondary); font-size: var(--text-sm); margin: 0; line-height: 1.6; }
    .demo-section { margin-bottom: var(--spacing-10); }
    .demo-title { font-size: var(--text-xs); font-weight: var(--font-semibold); text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-tertiary); margin-bottom: var(--spacing-4); }
    .demo-label { font-size: var(--text-xs); color: var(--text-tertiary); font-weight: var(--font-medium); margin-bottom: var(--spacing-2); }
    .demo-stage {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: var(--spacing-6);
      margin-bottom: var(--spacing-4);
    }
    .theme-switch {
      position: fixed; top: var(--spacing-4); right: var(--spacing-4); z-index: 100;
      display: flex; gap: var(--spacing-2);
      background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border); border-radius: var(--radius-full); padding: 3px;
    }
    .theme-btn {
      padding: var(--spacing-1) var(--spacing-3); border-radius: var(--radius-full); border: none;
      background: transparent; color: var(--text-tertiary); cursor: pointer;
      font-size: var(--text-xs); font-family: var(--font-sans); font-weight: var(--font-medium);
      transition: all var(--transition-fast);
    }
    .theme-btn.active { background: var(--bg-surface); color: var(--text-primary); box-shadow: var(--shadow-sm); }
  </style>
</head>
<body>

  <div class="theme-switch">
    <button class="theme-btn" onclick="setTheme('light')">Light</button>
    <button class="theme-btn active" onclick="setTheme('dark')">Dark</button>
  </div>

  <div class="demo-header">
    <h1>Tabs 选项卡</h1>
    <p class="subtitle">安静的导航灯 — 指示器用品牌渐变色，活跃 Tab 的文字也带渐变。视觉焦点自然跟随，不张扬但清晰。</p>
  </div>

  <!-- ===== Underline ===== -->
  <div class="demo-section">
    <div class="demo-title">Underline 下划线</div>
    <div class="demo-stage">
      <div class="demo-label">工作台模式切换</div>
      <div class="tabs tabs--underline" role="tablist">
        <button class="tabs__item is-active" role="tab" aria-selected="true" onclick="switchTab(this)">角色立绘</button>
        <button class="tabs__item" role="tab" aria-selected="false" onclick="switchTab(this)">场景原画</button>
        <button class="tabs__item" role="tab" aria-selected="false" onclick="switchTab(this)">Sprite 批量</button>
        <button class="tabs__item" role="tab" aria-selected="false" onclick="switchTab(this)">动画预览</button>
        <button class="tabs__item" role="tab" aria-selected="false" onclick="switchTab(this)">材质纹理</button>
        <button class="tabs__item" role="tab" aria-selected="false" onclick="switchTab(this)">AI 精修</button>
      </div>
    </div>
  </div>

  <!-- ===== Underline + Icons ===== -->
  <div class="demo-section">
    <div class="demo-title">Underline with Icons 带图标下划线</div>
    <div class="demo-stage">
      <div class="tabs tabs--underline" role="tablist">
        <button class="tabs__item is-active" role="tab" aria-selected="true" onclick="switchTab(this)">
          <svg viewBox="0 0 16 16" fill="none"><rect x="3" y="2" width="10" height="12" rx="1.5" stroke="currentColor" stroke-width="1.3"/><circle cx="8" cy="6.5" r="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M5 11.5c0-1.1 1.3-2 3-2s3 .9 3 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          我的作品
        </button>
        <button class="tabs__item" role="tab" aria-selected="false" onclick="switchTab(this)">
          <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="2" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/></svg>
          作品广场
        </button>
        <button class="tabs__item" role="tab" aria-selected="false" onclick="switchTab(this)">
          <svg viewBox="0 0 16 16" fill="none"><path d="M2 4h12M5 4V2.5h6V4M6.5 7v4.5M9.5 7v4.5M3.5 4l.5 9a1 1 0 001 1h6a1 1 0 001-1l.5-9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          回收站
        </button>
      </div>
    </div>
  </div>

  <!-- ===== Pill ===== -->
  <div class="demo-section">
    <div class="demo-title">Pill 胶囊筛选</div>
    <div class="demo-stage">
      <div class="demo-label">风格筛选</div>
      <div class="tabs tabs--pill" role="tablist">
        <button class="tabs__item is-active" role="tab" aria-selected="true" onclick="switchTab(this)">全部</button>
        <button class="tabs__item" role="tab" aria-selected="false" onclick="switchTab(this)">奇幻 RPG</button>
        <button class="tabs__item" role="tab" aria-selected="false" onclick="switchTab(this)">二次元</button>
        <button class="tabs__item" role="tab" aria-selected="false" onclick="switchTab(this)">像素风</button>
        <button class="tabs__item" role="tab" aria-selected="false" onclick="switchTab(this)">写实</button>
        <button class="tabs__item" role="tab" aria-selected="false" onclick="switchTab(this)">赛博朋克</button>
      </div>
    </div>
  </div>

  <!-- ===== Segment ===== -->
  <div class="demo-section">
    <div class="demo-title">Segment 分段控制器</div>
    <div class="demo-stage">
      <div class="demo-label">视图切换</div>
      <div class="tabs tabs--segment" role="tablist" style="width: 220px">
        <button class="tabs__item is-active" role="tab" aria-selected="true" onclick="switchTab(this)">
          <svg viewBox="0 0 16 16" fill="none" width="14" height="14"><rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/></svg>
          网格
        </button>
        <button class="tabs__item" role="tab" aria-selected="false" onclick="switchTab(this)">
          <svg viewBox="0 0 16 16" fill="none" width="14" height="14"><path d="M2 3.5h12M2 8h12M2 12.5h12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          列表
        </button>
      </div>
    </div>
  </div>

  <!-- ===== Disabled ===== -->
  <div class="demo-section">
    <div class="demo-title">Disabled 禁用态</div>
    <div class="demo-stage">
      <div class="tabs tabs--underline" role="tablist">
        <button class="tabs__item is-active" role="tab" aria-selected="true" onclick="switchTab(this)">角色立绘</button>
        <button class="tabs__item" role="tab" aria-selected="false" onclick="switchTab(this)">场景原画</button>
        <button class="tabs__item" role="tab" aria-selected="false" disabled>动画预览（开发中）</button>
        <button class="tabs__item" role="tab" aria-selected="false" onclick="switchTab(this)">AI 精修</button>
      </div>
    </div>
  </div>

  <script>
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.toggle('active', btn.textContent.toLowerCase() === theme));
    }
    function switchTab(el) {
      const tablist = el.closest('.tabs');
      tablist.querySelectorAll('.tabs__item').forEach(t => {
        t.classList.remove('is-active');
        t.setAttribute('aria-selected', 'false');
      });
      el.classList.add('is-active');
      el.setAttribute('aria-selected', 'true');
    }
  </script>
</body>
</html>
