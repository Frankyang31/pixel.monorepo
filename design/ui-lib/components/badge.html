<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badge — 深夜工作室 v3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../tokens.css">
  <style>
    /* ================================================================
       BADGE — "发光的标签"
       功能 Badge 使用玻璃态底色而非实色。
       品牌 Badge 带外发光。
       ================================================================ */

    .badge {
      display: inline-flex;
      align-items: center;
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: var(--font-semibold);
      white-space: nowrap;
      border-radius: var(--radius-full);
      padding: 0 10px;
      height: 22px;
      letter-spacing: 0.01em;
      line-height: 1;
      transition: box-shadow var(--transition-fast), background-color var(--transition-fast);
    }

    /* --- Brand — 渐变 + 外发光 --- */
    .badge--brand {
      background: rgba(123, 94, 240, 0.12);
      color: var(--color-accent-purple);
      border: 1px solid rgba(123, 94, 240, 0.15);
    }
    .badge--brand:hover {
      box-shadow: var(--glow-brand-sm);
      background: rgba(123, 94, 240, 0.18);
    }

    /* --- Gradient — 渐变填充（最醒目） + 内高光 --- */
    .badge--gradient {
      background: var(--color-brand-gradient);
      color: #FFFFFF;
      box-shadow: 0 2px 8px rgba(123, 94, 240, 0.20),
                  inset 0 1px 0 rgba(255,255,255,0.12);
    }

    /* --- Success --- */
    .badge--success {
      background: rgba(45, 212, 191, 0.10);
      color: var(--color-success);
      border: 1px solid rgba(45, 212, 191, 0.12);
    }

    /* --- Warning --- */
    .badge--warning {
      background: rgba(251, 191, 36, 0.10);
      color: var(--color-warning);
      border: 1px solid rgba(251, 191, 36, 0.12);
    }

    /* --- Error --- */
    .badge--error {
      background: rgba(248, 113, 113, 0.10);
      color: var(--color-error);
      border: 1px solid rgba(248, 113, 113, 0.12);
    }

    /* --- Info --- */
    .badge--info {
      background: rgba(96, 165, 250, 0.10);
      color: var(--color-info);
      border: 1px solid rgba(96, 165, 250, 0.12);
    }

    /* --- Neutral --- */
    .badge--neutral {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      color: var(--text-secondary);
      border: 1px solid var(--glass-border);
    }

    /* --- Dot (状态圆点) --- */
    .badge__dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
      margin-right: var(--spacing-1);
    }
    .badge__dot--pulse {
      animation: pulse-glow 2s ease-in-out infinite;
    }

    /* --- Gradient Text Badge --- */
    .badge--text-gradient {
      background: transparent;
      color: var(--text-gradient-color);
      background-image: var(--text-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      border: 1px solid rgba(123, 94, 240, 0.20);
    }

    /* --- Count Badge (计数角标) --- */
    .badge--count {
      background: var(--color-brand-gradient);
      color: #FFFFFF;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      font-size: 10px;
      font-weight: var(--font-bold);
      border-radius: var(--radius-full);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(123,94,240,0.25),
                  inset 0 1px 0 rgba(255,255,255,0.12);
    }

    /* ================================================================
       DEMO
       ================================================================ */
    body {
      font-family: var(--font-sans);
      background: var(--bg-base);
      color: var(--text-primary);
      margin: 0;
      padding: var(--spacing-8) var(--spacing-8) var(--spacing-20);
      max-width: 960px;
      margin-left: auto; margin-right: auto;
      transition: background-color var(--transition-slow), color var(--transition-slow);
    }
    .demo-header { margin-bottom: var(--spacing-10); padding-bottom: var(--spacing-6); border-bottom: 1px solid var(--border-subtle); }
    h1 { font-size: var(--text-2xl); font-weight: var(--font-bold); margin: 0 0 var(--spacing-1) 0; letter-spacing: -0.02em; }
    .subtitle { color: var(--text-secondary); font-size: var(--text-sm); margin: 0; line-height: 1.6; }
    .demo-section { margin-bottom: var(--spacing-10); }
    .demo-title { font-size: var(--text-xs); font-weight: var(--font-semibold); text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-tertiary); margin-bottom: var(--spacing-4); }
    .demo-row { display: flex; align-items: center; gap: var(--spacing-3); flex-wrap: wrap; margin-bottom: var(--spacing-4); }
    .demo-stage {
      background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border); border-radius: var(--radius-xl); padding: var(--spacing-6);
      margin-bottom: var(--spacing-4);
    }
    .demo-label { font-size: var(--text-xs); color: var(--text-tertiary); min-width: 100px; font-weight: var(--font-medium); font-family: var(--font-mono); }
    .theme-switch {
      position: fixed; top: var(--spacing-4); right: var(--spacing-4); z-index: 100;
      display: flex; gap: var(--spacing-2);
      background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border); border-radius: var(--radius-full); padding: 3px;
    }
    .theme-btn {
      padding: var(--spacing-1) var(--spacing-3); border-radius: var(--radius-full); border: none;
      background: transparent; color: var(--text-tertiary); cursor: pointer;
      font-size: var(--text-xs); font-family: var(--font-sans); font-weight: var(--font-medium);
      transition: all var(--transition-fast);
    }
    .theme-btn.active { background: var(--bg-surface); color: var(--text-primary); box-shadow: var(--shadow-sm); }

    /* Count badge demo */
    .icon-btn {
      position: relative;
      display: inline-flex; align-items: center; justify-content: center;
      width: 40px; height: 40px; border-radius: var(--radius-md);
      background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border); color: var(--text-secondary);
      cursor: pointer; transition: all var(--transition-fast);
    }
    .icon-btn:hover { border-color: var(--border-default); color: var(--text-primary); }
    .icon-btn svg { width: 18px; height: 18px; }
    .icon-btn .badge--count { position: absolute; top: -4px; right: -4px; }
  </style>
</head>
<body>

  <div class="theme-switch">
    <button class="theme-btn" onclick="setTheme('light')">Light</button>
    <button class="theme-btn active" onclick="setTheme('dark')">Dark</button>
  </div>

  <div class="demo-header">
    <h1>Badge 徽章</h1>
    <p class="subtitle">发光的标签 — 功能 Badge 使用玻璃态底色而非实色，品牌 Badge 带外发光。渐变文字标签用于 "New" / "Pro" 等强调。</p>
  </div>

  <!-- ===== 功能色 Badge ===== -->
  <div class="demo-section">
    <div class="demo-title">Semantic 语义色</div>
    <div class="demo-stage">
      <div class="demo-row">
        <span class="badge badge--brand">品牌</span>
        <span class="badge badge--success"><span class="badge__dot"></span>已完成</span>
        <span class="badge badge--warning"><span class="badge__dot"></span>处理中</span>
        <span class="badge badge--error"><span class="badge__dot"></span>失败</span>
        <span class="badge badge--info">信息</span>
        <span class="badge badge--neutral">默认</span>
      </div>
    </div>
  </div>

  <!-- ===== 品牌变体 ===== -->
  <div class="demo-section">
    <div class="demo-title">Brand Variants 品牌变体</div>
    <div class="demo-stage">
      <div class="demo-row">
        <span class="badge badge--brand">奇幻 RPG</span>
        <span class="badge badge--gradient">推荐</span>
        <span class="badge badge--text-gradient">NEW</span>
        <span class="badge badge--text-gradient">PRO</span>
      </div>
    </div>
  </div>

  <!-- ===== 脉冲圆点 ===== -->
  <div class="demo-section">
    <div class="demo-title">Pulse Dot 脉冲圆点</div>
    <p style="font-size:var(--text-sm);color:var(--text-secondary);margin:-8px 0 var(--spacing-4)">新消息/在线状态等需要吸引注意力的场景，圆点有呼吸灯效果。</p>
    <div class="demo-stage">
      <div class="demo-row">
        <span class="badge badge--success"><span class="badge__dot badge__dot--pulse"></span>在线</span>
        <span class="badge badge--error"><span class="badge__dot badge__dot--pulse"></span>3 条未读</span>
        <span class="badge badge--warning"><span class="badge__dot badge__dot--pulse"></span>生成中</span>
        <span class="badge badge--success"><span class="badge__dot"></span>离线</span>
      </div>
    </div>
  </div>

  <!-- ===== 计数角标 ===== -->
  <div class="demo-section">
    <div class="demo-title">Count Badge 计数角标</div>
    <div class="demo-stage">
      <div class="demo-row" style="gap: var(--spacing-4);">
        <button class="icon-btn" aria-label="通知">
          <svg viewBox="0 0 16 16" fill="none"><path d="M4.5 6.5a3.5 3.5 0 017 0c0 3.5 1.5 4.5 1.5 4.5h-10s1.5-1 1.5-4.5M6.5 13.5c.15.5.75.5 1 .5s.85 0 1-.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="badge--count">3</span>
        </button>
        <button class="icon-btn" aria-label="消息">
          <svg viewBox="0 0 16 16" fill="none"><path d="M2 4h12v7H8l-3 2.5V11H2V4z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="badge--count">12</span>
        </button>
        <button class="icon-btn" aria-label="购物车">
          <svg viewBox="0 0 16 16" fill="none"><path d="M1 2h2l2 8h7l1.5-5H5M5.5 13a1 1 0 110-2 1 1 0 010 2zM10.5 13a1 1 0 110-2 1 1 0 010 2z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="badge--count">99+</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ===== 场景组合 ===== -->
  <div class="demo-section">
    <div class="demo-title">In Context 场景组合</div>
    <div class="demo-stage">
      <div style="display:flex;align-items:center;gap:var(--spacing-3);margin-bottom:var(--spacing-4)">
        <div style="width:36px;height:36px;border-radius:var(--radius-full);background:var(--color-brand-gradient);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700">A</div>
        <div>
          <div style="font-size:var(--text-sm);font-weight:var(--font-semibold)">创作者工作室 <span class="badge badge--gradient" style="margin-left:6px">PRO</span></div>
          <div style="font-size:var(--text-xs);color:var(--text-tertiary)">已生成 128 件作品 <span class="badge badge--success" style="margin-left:6px"><span class="badge__dot badge__dot--pulse"></span>在线</span></div>
        </div>
      </div>
      <div style="display:flex;gap:var(--spacing-2);flex-wrap:wrap">
        <span class="badge badge--brand">奇幻 RPG</span>
        <span class="badge badge--brand">场景原画</span>
        <span class="badge badge--brand">Sprite</span>
        <span class="badge badge--text-gradient">NEW</span>
      </div>
    </div>
  </div>

  <script>
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.toggle('active', btn.textContent.toLowerCase() === theme));
    }
  </script>
</body>
</html>
