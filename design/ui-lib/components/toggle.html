<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toggle — 组件预览</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../tokens.css">
  <style>
    .toggle { display: inline-flex; background: var(--bg-overlay); border-radius: var(--radius-md); padding: 3px; gap: 2px; }
    .toggle__item { display: inline-flex; align-items: center; justify-content: center; gap: var(--spacing-1); padding: 0 var(--spacing-3); height: 36px; border-radius: 6px; font-family: var(--font-sans); font-size: 13px; font-weight: var(--font-medium); color: var(--text-secondary); background: transparent; border: none; cursor: pointer; transition: all var(--transition-fast); white-space: nowrap; }
    .toggle__item svg { width: 16px; height: 16px; }
    .toggle__item:hover:not(.is-active):not(:disabled) { color: var(--text-primary); background: var(--bg-elevated); }
    .toggle__item:focus-visible { outline: 2px solid var(--color-brand-mid); outline-offset: 2px; }
    .toggle__item.is-active { background: var(--bg-surface); color: var(--text-primary); font-weight: var(--font-semibold); box-shadow: var(--shadow-sm); }
    .toggle__item:disabled { opacity: 0.4; cursor: not-allowed; }
    .toggle--sm { padding: 2px; }
    .toggle--sm .toggle__item { height: 28px; font-size: 12px; padding: 0 var(--spacing-2); }
    .toggle--sm .toggle__item svg { width: 14px; height: 14px; }
    .toggle--lg { padding: 4px; }
    .toggle--lg .toggle__item { height: 44px; font-size: 14px; padding: 0 var(--spacing-4); }
    .toggle--lg .toggle__item svg { width: 18px; height: 18px; }

    body { font-family: var(--font-sans); background: var(--bg-base); color: var(--text-primary); margin: 0; padding: var(--spacing-8); }
    .demo-section { margin-bottom: var(--spacing-12); }
    .demo-title { font-size: var(--text-lg); font-weight: var(--font-semibold); margin-bottom: var(--spacing-4); border-bottom: 1px solid var(--border-subtle); padding-bottom: var(--spacing-2); }
    .demo-row { display: flex; gap: var(--spacing-4); align-items: center; flex-wrap: wrap; margin-bottom: var(--spacing-4); }
    .demo-label { font-size: var(--text-xs); color: var(--text-tertiary); min-width: 80px; font-weight: var(--font-medium); }
    .theme-switch { position: fixed; top: var(--spacing-4); right: var(--spacing-4); z-index: 100; display: flex; gap: var(--spacing-2); }
    .theme-btn { padding: var(--spacing-2) var(--spacing-3); border-radius: var(--radius-md); border: 1px solid var(--border-default); background: var(--bg-surface); color: var(--text-secondary); cursor: pointer; font-size: var(--text-sm); font-family: var(--font-sans); }
    .theme-btn.active { border-color: var(--color-brand-mid); color: var(--color-brand-mid); }
    h1 { font-size: var(--text-3xl); font-weight: var(--font-bold); margin-bottom: var(--spacing-2); }
    .subtitle { color: var(--text-secondary); font-size: var(--text-base); margin-bottom: var(--spacing-8); }
    .demo-card { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: var(--spacing-5); margin-bottom: var(--spacing-4); }
    .demo-card .demo-label { margin-bottom: var(--spacing-3); }
  </style>
</head>
<body>
  <div class="theme-switch"><button class="theme-btn active" onclick="setTheme('light')">Light</button><button class="theme-btn" onclick="setTheme('dark')">Dark</button></div>
  <h1>Toggle 按钮组</h1>
  <p class="subtitle">互斥选项切换，支持图标和文字组合。</p>

  <div class="demo-section">
    <div class="demo-title">视图切换</div>
    <div class="demo-card">
      <div class="demo-label">作品展示方式</div>
      <div class="toggle" role="radiogroup">
        <button class="toggle__item is-active" role="radio" aria-checked="true" onclick="toggleActive(this)">
          <svg viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="9.5" y="1" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="9.5" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="9.5" y="9.5" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.3"/></svg>
          网格
        </button>
        <button class="toggle__item" role="radio" aria-checked="false" onclick="toggleActive(this)">
          <svg viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          列表
        </button>
        <button class="toggle__item" role="radio" aria-checked="false" onclick="toggleActive(this)">
          <svg viewBox="0 0 16 16" fill="none"><rect x="1.5" y="2" width="13" height="12" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M1.5 5.5h13" stroke="currentColor" stroke-width="1.3"/></svg>
          瀑布流
        </button>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <div class="demo-title">模型选择</div>
    <div class="demo-card">
      <div class="demo-label">生成模型</div>
      <div class="toggle" role="radiogroup">
        <button class="toggle__item is-active" role="radio" aria-checked="true" onclick="toggleActive(this)">SDXL</button>
        <button class="toggle__item" role="radio" aria-checked="false" onclick="toggleActive(this)">SD 3.5</button>
        <button class="toggle__item" role="radio" aria-checked="false" onclick="toggleActive(this)">Midjourney</button>
        <button class="toggle__item" role="radio" aria-checked="false" onclick="toggleActive(this)">DALL-E 3</button>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <div class="demo-title">尺寸</div>
    <div class="demo-row">
      <div>
        <div class="demo-label" style="margin-bottom:4px">SM 28px</div>
        <div class="toggle toggle--sm" role="radiogroup"><button class="toggle__item is-active" role="radio">A</button><button class="toggle__item" role="radio">B</button></div>
      </div>
      <div>
        <div class="demo-label" style="margin-bottom:4px">MD 36px</div>
        <div class="toggle" role="radiogroup"><button class="toggle__item is-active" role="radio">A</button><button class="toggle__item" role="radio">B</button><button class="toggle__item" role="radio">C</button></div>
      </div>
      <div>
        <div class="demo-label" style="margin-bottom:4px">LG 44px</div>
        <div class="toggle toggle--lg" role="radiogroup"><button class="toggle__item is-active" role="radio">选项一</button><button class="toggle__item" role="radio">选项二</button></div>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <div class="demo-title">禁用状态</div>
    <div class="demo-card">
      <div class="toggle" role="radiogroup">
        <button class="toggle__item is-active" role="radio" aria-checked="true">可用</button>
        <button class="toggle__item" role="radio" disabled>开发中</button>
        <button class="toggle__item" role="radio" disabled>敬请期待</button>
      </div>
    </div>
  </div>

  <script>
    function setTheme(t){document.documentElement.setAttribute('data-theme',t);document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase()===t));}
    function toggleActive(el) {
      el.closest('.toggle').querySelectorAll('.toggle__item').forEach(i => { i.classList.remove('is-active'); i.setAttribute('aria-checked', 'false'); });
      el.classList.add('is-active'); el.setAttribute('aria-checked', 'true');
    }
  </script>
</body>
</html>
