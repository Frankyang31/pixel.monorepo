<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>页面不见了 — PixelMind</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --brand-start:#7B5EF0;--brand-end:#4F8EF7;
      --bg-base:#F5F4F8;--bg-surface:#FFFFFF;--bg-elevated:#EFEFF5;
      --border-subtle:rgba(0,0,0,0.06);--border-default:rgba(0,0,0,0.10);
      --text-primary:#111118;--text-secondary:#5A5A70;--text-tertiary:#9898B0;
      --shadow-sm:0 1px 4px rgba(0,0,0,0.06);--shadow-md:0 4px 16px rgba(0,0,0,0.08);--shadow-lg:0 8px 40px rgba(0,0,0,0.12);
      --radius-sm:4px;--radius-md:8px;--radius-lg:12px;--radius-xl:16px;--radius-2xl:24px;--radius-full:9999px;
      --font-sans:'Inter','PingFang SC',system-ui,sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font-sans);background:var(--bg-base);color:var(--text-primary);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;}
    a{text-decoration:none;color:inherit;}

    /* Nav */
    nav{background:rgba(245,244,248,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border-subtle);position:sticky;top:0;z-index:100;}
    .nav-inner{max-width:1280px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px;}
    .nav-logo{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:700;color:var(--text-primary);}
    .nav-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--brand-start),var(--brand-end));border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;}
    .nav-links{display:flex;align-items:center;gap:32px;list-style:none;}
    .nav-links a{font-size:14px;font-weight:500;color:var(--text-secondary);transition:color .2s;}
    .nav-links a:hover{color:var(--text-primary);}
    .nav-right{display:flex;align-items:center;gap:12px;}
    .btn-nav-login{padding:8px 16px;font-size:14px;font-weight:500;color:var(--text-secondary);cursor:pointer;}
    .btn-nav-cta{padding:8px 18px;background:linear-gradient(135deg,var(--brand-start),var(--brand-end));color:#fff;font-size:14px;font-weight:600;border-radius:var(--radius-md);cursor:pointer;}

    /* Main */
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:80px 32px;}
    .error-container{text-align:center;max-width:600px;}

    /* Big 404 */
    .big-number{position:relative;margin-bottom:24px;display:inline-block;}
    .num-text{font-size:160px;font-weight:900;letter-spacing:-0.05em;line-height:1;background:linear-gradient(135deg,var(--brand-start),var(--brand-end));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative;z-index:2;}
    .num-shadow{position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);width:200px;height:24px;background:radial-gradient(ellipse,rgba(123,94,240,0.25),transparent 70%);filter:blur(8px);}

    /* Floating Emoji */
    .float-emoji{font-size:48px;display:block;margin-bottom:24px;animation:float 3s ease-in-out infinite;}
    @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}

    .error-title{font-size:28px;font-weight:800;letter-spacing:-0.02em;margin-bottom:12px;color:var(--text-primary);}
    .error-desc{font-size:16px;color:var(--text-secondary);line-height:1.7;margin-bottom:36px;}

    /* Search */
    .search-box{display:flex;gap:0;margin-bottom:36px;border-radius:var(--radius-full);overflow:hidden;box-shadow:var(--shadow-md);background:var(--bg-surface);}
    .search-input{flex:1;padding:14px 20px;border:none;font-size:15px;font-family:var(--font-sans);color:var(--text-primary);background:transparent;outline:none;}
    .search-input::placeholder{color:var(--text-tertiary);}
    .search-btn{padding:12px 24px;background:linear-gradient(135deg,var(--brand-start),var(--brand-end));color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;white-space:nowrap;}

    /* Action Buttons */
    .action-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:48px;}
    .btn-primary{padding:12px 28px;background:linear-gradient(135deg,var(--brand-start),var(--brand-end));color:#fff;font-size:15px;font-weight:700;border-radius:var(--radius-xl);cursor:pointer;border:none;transition:opacity .2s;}
    .btn-primary:hover{opacity:0.9;}
    .btn-secondary{padding:12px 28px;background:var(--bg-surface);color:var(--text-secondary);font-size:15px;font-weight:600;border-radius:var(--radius-xl);border:1px solid var(--border-default);cursor:pointer;transition:all .2s;}
    .btn-secondary:hover{border-color:rgba(123,94,240,0.3);color:var(--brand-start);}

    /* Quick Links */
    .quick-links{display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap;}
    .quick-label{font-size:13px;color:var(--text-tertiary);}
    .quick-link{padding:6px 14px;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-full);font-size:13px;color:var(--text-secondary);cursor:pointer;transition:all .2s;box-shadow:var(--shadow-sm);}
    .quick-link:hover{border-color:rgba(123,94,240,0.3);color:var(--brand-start);}

    /* Decorative BG */
    .bg-blob{position:fixed;pointer-events:none;border-radius:50%;filter:blur(80px);opacity:0.15;z-index:0;}
    .blob-1{width:400px;height:400px;background:var(--brand-start);top:-100px;right:-100px;}
    .blob-2{width:300px;height:300px;background:var(--brand-end);bottom:-80px;left:-80px;}

    /* Footer */
    footer{background:var(--bg-surface);border-top:1px solid var(--border-subtle);padding:20px 32px;text-align:center;font-size:13px;color:var(--text-tertiary);}
    footer a{color:var(--text-tertiary);margin:0 12px;transition:color .2s;}
    footer a:hover{color:var(--text-secondary);}
  </style>
</head>
<body>

<div class="bg-blob blob-1"></div>
<div class="bg-blob blob-2"></div>

<!-- Nav -->
<nav>
  <div class="nav-inner">
    <a href="#" class="nav-logo">
      <div class="nav-logo-icon">✦</div>
      PixelMind
    </a>
    <ul class="nav-links">
      <li><a href="#">工具</a></li>
      <li><a href="#">广场</a></li>
      <li><a href="#">定价</a></li>
      <li><a href="#">博客</a></li>
    </ul>
    <div class="nav-right">
      <span class="btn-nav-login">登录</span>
      <a href="#" class="btn-nav-cta">免费开始</a>
    </div>
  </div>
</nav>

<!-- Main Error Content -->
<main>
  <div class="error-container" style="position:relative;z-index:1;">
    
    <div class="big-number">
      <div class="num-text">404</div>
      <div class="num-shadow"></div>
    </div>

    <span class="float-emoji">🔍</span>

    <div class="error-title">这个页面迷路了</div>
    <div class="error-desc">
      你要找的页面可能已经被移动、删除，或者从来就不存在。<br/>
      试试搜索你想要的内容，或者直接回首页吧。
    </div>

    <!-- Search -->
    <div class="search-box">
      <input class="search-input" type="text" placeholder="搜索工具、教程、作品灵感..."/>
      <button class="search-btn">搜索</button>
    </div>

    <!-- Actions -->
    <div class="action-row">
      <button class="btn-primary" onclick="window.location.href='#'">🏠 回到首页</button>
      <button class="btn-secondary" onclick="history.back()">← 返回上页</button>
    </div>

    <!-- Quick Links -->
    <div class="quick-links">
      <span class="quick-label">热门页面：</span>
      <a href="#" class="quick-link">✦ 工作台</a>
      <a href="#" class="quick-link">🎨 作品广场</a>
      <a href="#" class="quick-link">💎 定价方案</a>
      <a href="#" class="quick-link">📖 使用教程</a>
      <a href="#" class="quick-link">🛠️ 所有工具</a>
    </div>

  </div>
</main>

<!-- Footer -->
<footer style="position:relative;z-index:1;">
  <span>© 2026 PixelMind. 保留所有权利。</span>
  <a href="#">帮助中心</a>
  <a href="#">联系我们</a>
  <a href="#">服务协议</a>
  <a href="#">隐私政策</a>
</footer>

<script>
  // Search on Enter
  document.querySelector('.search-input').addEventListener('keydown',function(e){
    if(e.key==='Enter' && this.value.trim()){
      alert('搜索：' + this.value.trim());
    }
  });
  document.querySelector('.search-btn').addEventListener('click',function(){
    const val = document.querySelector('.search-input').value.trim();
    if(val) alert('搜索：' + val);
  });
</script>
</body>
</html>
