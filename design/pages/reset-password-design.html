<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>找回密码 — PixelMind</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--brand-start:#7B5EF0;--brand-end:#4F8EF7;--brand-mid:#6370F3;--accent-teal:#2DD4BF;--bg-base:#0D0D12;--bg-surface:#13131A;--bg-elevated:#1C1C27;--border-subtle:rgba(255,255,255,0.06);--border-default:rgba(255,255,255,0.10);--border-brand:rgba(123,94,240,0.40);--text-primary:#F0F0F8;--text-secondary:#A0A0B8;--text-tertiary:#606078;--color-success:#2DD4BF;--color-error:#F87171;--radius-md:8px;--radius-lg:12px;--radius-xl:16px;--radius-2xl:24px;--radius-full:9999px;--font-sans:'Inter','PingFang SC',system-ui,sans-serif;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font-sans);background:var(--bg-base);color:var(--text-primary);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;}
    a{text-decoration:none;color:inherit;}
    nav{background:rgba(13,13,18,0.95);border-bottom:1px solid var(--border-subtle);padding:0 32px;}
    .nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px;}
    .nav-logo{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:700;}
    .nav-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--brand-start),var(--brand-end));border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;}
    .nav-link{font-size:14px;color:var(--text-secondary);transition:color .2s;}
    .nav-link:hover{color:var(--text-primary);}

    main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
    .reset-card{width:100%;max-width:440px;}

    /* Steps indicator */
    .steps-indicator{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:32px;}
    .step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all .3s;}
    .step-dot.done{background:linear-gradient(135deg,var(--brand-start),var(--brand-end));color:#fff;}
    .step-dot.active{background:linear-gradient(135deg,var(--brand-start),var(--brand-end));color:#fff;box-shadow:0 0 12px rgba(123,94,240,0.4);}
    .step-dot.pending{background:var(--bg-elevated);border:1px solid var(--border-default);color:var(--text-tertiary);}
    .step-line{width:48px;height:2px;background:var(--border-default);}
    .step-line.done{background:linear-gradient(90deg,var(--brand-start),var(--brand-end));}

    /* Form card */
    .form-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-2xl);padding:36px;transition:all .4s;}
    .form-title{font-size:22px;font-weight:800;text-align:center;margin-bottom:6px;}
    .form-subtitle{font-size:14px;color:var(--text-secondary);text-align:center;line-height:1.6;margin-bottom:28px;}
    .form-group{margin-bottom:16px;}
    .form-label{font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:7px;display:block;}
    .form-input{width:100%;padding:11px 14px;background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:var(--radius-md);font-size:14px;color:var(--text-primary);outline:none;font-family:var(--font-sans);transition:border-color .2s;}
    .form-input:focus{border-color:var(--border-brand);}
    .form-input::placeholder{color:var(--text-tertiary);}
    .code-row{display:flex;gap:8px;}
    .code-row .form-input{flex:1;}
    .btn-send-code{padding:11px 16px;background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:var(--radius-md);font-size:13px;font-weight:600;color:var(--brand-mid);cursor:pointer;white-space:nowrap;transition:all .2s;}
    .btn-send-code:hover{border-color:var(--border-brand);}
    .btn-send-code.countdown{color:var(--text-tertiary);cursor:default;}
    .form-hint{font-size:12px;color:var(--text-tertiary);margin-top:5px;}
    .form-error{font-size:12px;color:var(--color-error);margin-top:5px;display:flex;align-items:center;gap:4px;}
    .password-field{position:relative;}
    .password-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:16px;color:var(--text-tertiary);}
    .strength-bar{display:flex;gap:4px;margin-top:8px;}
    .strength-seg{height:3px;flex:1;border-radius:2px;background:var(--border-subtle);}
    .strength-seg.active{background:linear-gradient(90deg,var(--brand-start),var(--brand-end));}
    .strength-label{font-size:11px;color:var(--text-tertiary);margin-top:4px;}
    .btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,var(--brand-start),var(--brand-end));color:#fff;font-size:15px;font-weight:700;border:none;border-radius:var(--radius-md);cursor:pointer;margin-top:6px;transition:opacity .2s;}
    .btn-submit:hover{opacity:.9;}
    .back-link{text-align:center;margin-top:16px;font-size:14px;color:var(--text-tertiary);}
    .back-link a{color:var(--brand-mid);}

    /* State pages */
    .page-step{display:none;}
    .page-step.active{display:block;}

    /* Success */
    .success-wrap{text-align:center;}
    .success-icon{font-size:56px;margin-bottom:16px;}
    .success-title{font-size:22px;font-weight:800;margin-bottom:8px;}
    .success-desc{font-size:14px;color:var(--text-secondary);line-height:1.7;margin-bottom:28px;}
    .btn-goto-login{width:100%;padding:13px;background:linear-gradient(135deg,var(--brand-start),var(--brand-end));color:#fff;font-size:15px;font-weight:700;border:none;border-radius:var(--radius-md);cursor:pointer;}

    footer{padding:20px;text-align:center;font-size:13px;color:var(--text-tertiary);}
    footer a{color:var(--text-tertiary);margin:0 10px;}
  </style>
</head>
<body>
<nav><div class="nav-inner">
  <div class="nav-logo"><div class="nav-logo-icon">✦</div>PixelMind</div>
  <a href="auth-design.html" class="nav-link">← 返回登录</a>
</div></nav>

<main>
  <div class="reset-card">
    <!-- Step indicator -->
    <div class="steps-indicator">
      <div class="step-dot done" id="dot1">✓</div>
      <div class="step-line done" id="line1"></div>
      <div class="step-dot active" id="dot2">2</div>
      <div class="step-line" id="line2"></div>
      <div class="step-dot pending" id="dot3">3</div>
    </div>

    <!-- Step 1: Enter email -->
    <div class="form-card page-step active" id="step1">
      <div class="form-title">找回密码</div>
      <div class="form-subtitle">输入你的注册邮箱或手机号，<br/>我们将发送验证码</div>
      <div class="form-group">
        <label class="form-label">邮箱或手机号</label>
        <input class="form-input" placeholder="请输入邮箱地址或手机号" value="xiao***@example.com"/>
      </div>
      <button class="btn-submit" onclick="goStep(2)">发送验证码</button>
      <div class="back-link"><a href="auth-design.html">← 返回登录页</a></div>
    </div>

    <!-- Step 2: Enter code -->
    <div class="form-card page-step" id="step2">
      <div class="form-title">输入验证码</div>
      <div class="form-subtitle">验证码已发送至<br/><strong style="color:var(--text-primary);">xiao***@example.com</strong></div>
      <div class="form-group">
        <label class="form-label">验证码</label>
        <div class="code-row">
          <input class="form-input" placeholder="输入 6 位验证码" maxlength="6"/>
          <button class="btn-send-code countdown" id="codeBtn">55s 后重发</button>
        </div>
        <div class="form-hint">验证码 10 分钟内有效，请注意查收垃圾邮件</div>
      </div>
      <button class="btn-submit" onclick="goStep(3)">验证</button>
      <div class="back-link"><a href="#" onclick="goStep(1)">← 更换邮箱</a></div>
    </div>

    <!-- Step 3: New password -->
    <div class="form-card page-step" id="step3">
      <div class="form-title">设置新密码</div>
      <div class="form-subtitle">请设置一个安全的新密码</div>
      <div class="form-group">
        <label class="form-label">新密码</label>
        <div class="password-field">
          <input class="form-input" type="password" placeholder="至少 8 位，包含字母和数字" id="pwd"/>
          <span class="password-toggle" onclick="togglePwd('pwd')">👁</span>
        </div>
        <div class="strength-bar">
          <div class="strength-seg active" id="s1"></div>
          <div class="strength-seg active" id="s2"></div>
          <div class="strength-seg" id="s3"></div>
          <div class="strength-seg" id="s4"></div>
        </div>
        <div class="strength-label" id="strengthLabel">强度：中等</div>
      </div>
      <div class="form-group">
        <label class="form-label">确认新密码</label>
        <div class="password-field">
          <input class="form-input" type="password" placeholder="再次输入新密码" id="pwd2"/>
          <span class="password-toggle" onclick="togglePwd('pwd2')">👁</span>
        </div>
      </div>
      <button class="btn-submit" onclick="goStep(4)">确认修改密码</button>
    </div>

    <!-- Step 4: Success -->
    <div class="form-card page-step" id="step4">
      <div class="success-wrap">
        <div class="success-icon">🎉</div>
        <div class="success-title">密码修改成功！</div>
        <div class="success-desc">你的密码已成功更新。<br/>现在可以使用新密码登录账号了。</div>
        <button class="btn-goto-login" onclick="window.location.href='auth-design.html'">前往登录 →</button>
      </div>
    </div>

  </div>
</main>

<footer>
  <a href="#">隐私政策</a>
  <a href="#">服务条款</a>
  <a href="#">帮助中心</a>
</footer>

<script>
function goStep(n){
  document.querySelectorAll('.page-step').forEach(s=>s.classList.remove('active'));
  document.getElementById('step'+n).classList.add('active');
  // Update dots
  const dots=[null,document.getElementById('dot1'),document.getElementById('dot2'),document.getElementById('dot3')];
  const lines=[null,document.getElementById('line1'),document.getElementById('line2')];
  for(let i=1;i<=3;i++){
    if(i<n){dots[i].className='step-dot done';dots[i].textContent='✓';}
    else if(i===n){dots[i].className='step-dot active';dots[i].textContent=i;}
    else{dots[i].className='step-dot pending';dots[i].textContent=i;}
  }
  for(let i=1;i<=2;i++){
    lines[i].className=i<n?'step-line done':'step-line';
  }
}
function togglePwd(id){
  const el=document.getElementById(id);
  el.type=el.type==='password'?'text':'password';
}
// Start countdown
let t=55;
setInterval(()=>{
  if(t>0){t--;document.getElementById('codeBtn').textContent=t+'s 后重发';}
  else{const b=document.getElementById('codeBtn');b.textContent='重新发送';b.classList.remove('countdown');}
},1000);
</script>
</body>
</html>
